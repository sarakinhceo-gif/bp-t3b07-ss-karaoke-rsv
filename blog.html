        :root {

            --primary-light: #16213e;
            --accent: #e94560;
            --accent-hover: #d63851;
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --bg: #f8f6f2;

        .container {

        }

        /* Header & Navigation */

            top: 0;
            left: 0;

            height: var(--header-h);

            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: var(--transition);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;

        .logo {

            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .logo span {
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            padding: 4px 0;
        }
        nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: var(--transition);
        }
        nav a:hover {
            color: var(--primary);
        }
        nav a:hover::after {
            width: 100%;
        }
        .nav-cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff !important;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            box-shadow: 0 2px 12px rgba(233,69,96,0.25);
        }
        .nav-cta:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(233,69,96,0.35);
        }
        .nav-cta::after {
            display: none;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
            transition: var(--transition);
        }
